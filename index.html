<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Firmas de Email - Habitant Productions</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      text-align: center;
    }
    h1 {
      color: white;
      font-size: 28px;
      margin-bottom: 10px;
    }
    p {
      color: rgba(255,255,255,0.6);
      margin-bottom: 40px;
    }
    .cards {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 30px 40px;
      text-decoration: none;
      color: #333;
      transition: transform 0.2s, box-shadow 0.2s;
      min-width: 200px;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    }
    .card h2 {
      font-size: 18px;
      margin-bottom: 5px;
    }
    .card span {
      font-size: 13px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Firmas de Email</h1>
    <p>Habitant Productions</p>
    <div class="cards">
      <a href="firma-celeste.html" class="card">
        <h2>Celeste Arellano</h2>
        <span>Sistemas y Redes</span>
      </a>
      <a href="firma-francisco.html" class="card">
        <h2>Francisco Paparella</h2>
        <span>Director & ECP</span>
      </a>
    </div>
  </div>
</body>
</html>
